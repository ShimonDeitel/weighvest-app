name: Weighvest
options:
  bundleIdPrefix: com.shimondeitel.weighvest
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Weighvest:
    type: application
    platform: iOS
    sources:
      - path: Weighvest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.weighvest
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Weighvest/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WeighvestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WeighvestTests
      - path: Weighvest.storekit
    dependencies:
      - target: Weighvest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.weighvest.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WeighvestUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WeighvestUITests
    dependencies:
      - target: Weighvest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.weighvest.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Weighvest:
    build:
      targets:
        Weighvest: all
        WeighvestTests: [test]
        WeighvestUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Weighvest.storekit
    test:
      config: Debug
      storeKitConfiguration: Weighvest.storekit
      targets:
        - WeighvestTests
        - WeighvestUITests
    archive:
      config: Release
